name: Mariogolf64 (North America)
sha1: e2c4e7a905b29529b49a1619a401fe699224829b
options:
  basename: mariogolf64
  target_path: baserom.z64
  elf_path: build/mariogolf64.elf
  base_path: .
  platform: n64
  compiler: KMC

  # asm_path: asm
  # src_path: src
  # build_path: build
  # create_asm_dependencies: True

  ld_script_path: mariogolf64.ld
  ld_dependencies: True

  find_file_boundaries: True
  header_encoding: ASCII

  o_as_suffix: True
  use_legacy_include_asm: False
  mips_abi_float_regs: o32

  # Disable splat's regeneration of include/macro.inc, include_asm.h, and
  # labels.inc. Default behavior overwrites those files on every `make
  # extract` from a hardcoded template that emits `.internal
  # _MACRO_INC_GUARD` — a directive KMC binutils 2.6 `as` (which we use
  # for src/%) does not understand. We maintain those files by hand; splat
  # generated them once at project init and that's enough.
  generate_asm_macros_files: False

  # section_order: [".text", ".data", ".rodata", ".bss"]
  # auto_link_sections: [".data", ".rodata", ".bss"]

  symbol_addrs_path:
    - symbol_addrs.txt
    - ghidra_symbols.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  # string_encoding: ASCII
  # data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
  # libultra_symbols: True
  hardware_regs: True
  gfx_ucode: f3dex2
  subalign: null
  ld_align_section_vram_end: False
  ld_align_segment_vram_end: False
