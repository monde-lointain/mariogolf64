name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build ROM
    runs-on: ubuntu-latest

    # PUBLIC repo: never run the ROM-baked container for fork PRs. The build runs
    # PR-controlled make/scripts, which could exfiltrate /orig/baserom.z64. Limit
    # to same-repo pushes and same-repo PRs. (Forks also never receive GHCR_PAT,
    # so the container pull would fail anyway; this makes it a clean skip.)
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read

    # Private build image with the baserom baked in at /orig/. See docker/.
    container:
      image: ghcr.io/monde-lointain/mariogolf64-build:main
      credentials:
        username: monde-lointain
        password: ${{ secrets.GHCR_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Must precede any `make`: the Makefile errors at parse time if baserom.z64
      # is absent (and if mips-linux-gnu-cpp is missing, satisfied by the image).
      - name: Provide baserom
        run: cp /orig/baserom.z64 baserom.z64

      - name: Setup (venv + KMC toolchain)
        run: make setup

      - name: Extract (splat)
        run: make extract

      # verify-rom.sh runs `make`, gates on the `build/mariogolf64.z64: OK` line,
      # then checks SHA-1 == baserom (the mandated stale-green guard).
      - name: Build + verify ROM SHA-1
        run: tools/verify-rom.sh

  # Python static analysis for tools/ + tests/tooling/. ADVISORY for now: every
  # step is continue-on-error, so this job never blocks merge (ROM SHA-1 in
  # `build` stays the only hard gate). Flip the steps to required once the tree
  # is clean. Runs on plain ubuntu (no ROM, no container/secrets, fork-safe) and
  # invokes the tools directly, NOT via make: the Makefile errors at parse time
  # without baserom.z64. basedpyright needs the runtime venv to resolve imports,
  # so it stays local-only (`make typecheck`) until a deps-cached job is added.
  lint:
    name: Python static analysis (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tooling
        run: pip install -r tools/requirements-dev.txt

      - name: ruff format --check
        continue-on-error: true
        run: ruff format --check tools tests/tooling

      - name: ruff check
        continue-on-error: true
        run: ruff check tools tests/tooling

      - name: vulture (dead code)
        continue-on-error: true
        run: vulture
