[pytest]
# Characterization suite for the decomp tooling (tools/*.py). Run via `make test-tools`.
# These tests lock the *actual* current behavior of the tooling so the readability
# refactor can be verified behavior-preserving (Feathers, "Working Effectively with
# Legacy Code", ch. 13). They are NOT a spec of intended behavior.
testpaths = tests/tooling
python_files = test_*.py
addopts = -q
